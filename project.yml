name: samizdat-ios
options:
  bundleIdPrefix: com.anarki
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: DRMTP6V372
    SWIFT_VERSION: "5.9"

targets:
  samizdat-ios:
    type: application
    platform: iOS
    sources:
      - path: samizdat-ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anarki.samizdat-test
        PRODUCT_NAME: SamizdatTest
        INFOPLIST_FILE: samizdat-ios/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Samizdat Test AdHoc"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

name: samizdat-ios

options:
  bundleIdPrefix: com.anarki
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: DRMTP6V372
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTS_MACCATALYST: NO

targets:
  # ── Main application ────────────────────────────────────────────────────
  samizdat-ios:
    type: application
    platform: iOS
    sources:
      - path: samizdat-ios
        excludes:
          - "*.entitlements"
    dependencies:
      - target: samizdat-tunnel
        embed: true
        codeSign: true
      - framework: Frameworks/SamizdatClient.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anarki.samizdat-test
        PRODUCT_NAME: SamizdatTest
        INFOPLIST_FILE: samizdat-ios/Info.plist
        CODE_SIGN_ENTITLEMENTS: samizdat-ios/samizdat-ios.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Samizdat Test AdHoc"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Frameworks

  # ── PacketTunnel network-extension target ───────────────────────────────
  samizdat-tunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: samizdat-tunnel
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anarki.samizdat-test.tunnel
        PRODUCT_NAME: SamizdatTunnel
        INFOPLIST_FILE: samizdat-tunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: samizdat-tunnel/samizdat-tunnel.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Samizdat Tunnel AdHoc"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO

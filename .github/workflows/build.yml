name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Archive & export IPA
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SCHEME: samizdat-ios
      BUNDLE_ID: com.anarki.samizdat-test
      CONFIGURATION: Release
      ARCHIVE_PATH: ${{ github.workspace }}/build/samizdat-ios.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate into temporary keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          echo "--- Available signing identities ---"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          PROFILE_PATH="$PROFILES_DIR/samizdat_test_adhoc.mobileprovision"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          echo "--- Installed profile ---"
          /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin \
            <<< "$(security cms -D -i "$PROFILE_PATH")"

      - name: Archive
        run: |
          xcodebuild archive \
            -project samizdat-ios.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=DRMTP6V372 \
            PROVISIONING_PROFILE_SPECIFIER="Samizdat Test AdHoc" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Rename IPA
        run: |
          cd "$EXPORT_PATH"
          ls -la
          # Ensure deterministic filename
          IPA=$(ls *.ipa | head -1)
          mv "$IPA" samizdat-ios.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: samizdat-ios-ipa
          path: ${{ env.EXPORT_PATH }}/samizdat-ios.ipa
          if-no-files-found: error
          retention-days: 30
